<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>3D Viewer</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #222; }
  canvas { display: block; }
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); padding: 12px; text-align: center;
  }
  #controls button {
    margin: 4px; padding: 10px 20px; font-size: 16px;
    border: none; border-radius: 8px; cursor: pointer;
    background: #444; color: #fff;
  }
  #controls button.active { background: #f60; }
  #info { color: #aaa; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div id="controls">
  <button onclick="setSpeed(0.25)">超スロー</button>
  <button onclick="setSpeed(0.5)">スロー</button>
  <button onclick="setSpeed(1.0)">通常</button>
  <button onclick="setSpeed(2.0)">倍速</button>
  <button onclick="toggleAuto()" id="autoBtn">自動切替: OFF</button>
  <div id="info">Loading...</div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x333333);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,5);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,1,0);
controls.update();

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dir=new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

const draco=new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader=new GLTFLoader();
loader.setDRACOLoader(draco);

let mixer;
let autoMode=false;
let autoTimer=null;
let autoIndex=0;
const autoSpeeds=[0.25, 0.5];
const autoLabels=['超スロー','スロー'];
const autoInterval=5000;

function updateButtons(speed){
  document.querySelectorAll('#controls button:not(#autoBtn)').forEach(b=>{
    b.classList.toggle('active', parseFloat(b.textContent==='超スロー'?0.25:b.textContent==='スロー'?0.5:b.textContent==='通常'?1.0:2.0)==speed);
  });
}

window.setSpeed=function(s){
  if(mixer)mixer.timeScale=s;
  if(autoMode){autoMode=false;clearInterval(autoTimer);document.getElementById('autoBtn').textContent='自動切替: OFF';document.getElementById('autoBtn').classList.remove('active');}
  updateButtons(s);
  document.getElementById('info').textContent='Speed: '+s+'x';
};

window.toggleAuto=function(){
  autoMode=!autoMode;
  const btn=document.getElementById('autoBtn');
  if(autoMode){
    btn.textContent='自動切替: ON';
    btn.classList.add('active');
    autoIndex=0;
    applyAutoSpeed();
    autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%autoSpeeds.length;applyAutoSpeed();},autoInterval);
  }else{
    btn.textContent='自動切替: OFF';
    btn.classList.remove('active');
    clearInterval(autoTimer);
  }
};

function applyAutoSpeed(){
  const s=autoSpeeds[autoIndex];
  if(mixer)mixer.timeScale=s;
  updateButtons(s);
  document.getElementById('info').textContent=autoLabels[autoIndex]+' ('+s+'x) - '+Math.round(autoInterval/1000)+'秒ごと切替';
}

loader.load('./model.glb',gltf=>{
  scene.add(gltf.scene);
  const box=new THREE.Box3().setFromObject(gltf.scene);
  const center=box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.set(center.x,center.y+2,center.z+5);
  controls.update();
  if(gltf.animations.length>0){
    mixer=new THREE.AnimationMixer(gltf.scene);
    gltf.animations.forEach(clip=>{mixer.clipAction(clip).play();});
    // 自動切替を最初からONにする
    autoMode=true;
    document.getElementById('autoBtn').textContent='自動切替: ON';
    document.getElementById('autoBtn').classList.add('active');
    autoIndex=0;
    applyAutoSpeed();
    autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%autoSpeeds.length;applyAutoSpeed();},autoInterval);
  }
},xhr=>{
  document.getElementById('info').textContent='Loading: '+Math.round(xhr.loaded/xhr.total*100)+'%';
});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  if(mixer)mixer.update(clock.getDelta());
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
